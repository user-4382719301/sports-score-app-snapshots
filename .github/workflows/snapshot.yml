name: snapshot

on:
  schedule:
    # 09:00 UTC ≈ 05:00 ET. After most NBA/MLB games end the prior night.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run snapshot
        run: node scripts/snapshot.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain leaderboards)" ]]; then
            git add leaderboards
            git commit -m "Snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
